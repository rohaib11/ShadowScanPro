app:
  name: "SHADOWSCAN PRO"
  version: "1.0.0"
  author: "ROHAIB TECHNICAL"
  contact: "+92 306 3844400"

stealth:
  profile: "shadow"
  tor_enabled: false
  tor_socks_port: 9050
  tor_control_port: 9051
  user_agent_rotation: true
  fingerprint_randomization: true
  request_jitter: true
  waf_bypass: true

exploits:
  auto_exploit: true
  safe_mode: false
  max_depth: 3
  timeout: 30
  retry_attempts: 3
  concurrent_exploits: 5

scanning:
  ports:
    - 21,22,23,25,53,80,110,111,135,139,143,443,445
    - 993,995,1723,3306,3389,5432,5900,6379,8080,8443,27017
  service_detection: true
  vuln_scan: true
  aggressive: false

reporting:
  format: "html"
  output_dir: "~/.shadowscan/reports"
  include_screenshots: true
  include_payloads: true

alerts:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  discord:
    enabled: false
    webhook_url: ""
  slack:
    enabled: false
    webhook_url: ""

logging:
  level: "INFO"
  file: "~/.shadowscan/logs/shadowscan.log"
  max_size: "10MB"
  backup_count: 5